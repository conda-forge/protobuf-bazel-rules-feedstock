context:
  version: "34.0"
  major: 6

package:
  name: protobuf-bazel-rules
  version: ${{ version }}

source:
  url: https://github.com/protocolbuffers/protobuf/releases/download/v${{ version }}/protobuf-${{ version }}.tar.gz
  sha256: e540aae70d3b4f758846588768c9e39090fab880bc3233a1f42a8ab8d3781efd

build:
  number: 1
  noarch: generic

requirements:
  run_constraints:
    - protobuf ${{ major }}.${{ version }}.*
    - libprotobuf ${{ major }}.${{ version }}.*

tests:
  - package_contents:
      files:
        - share/bazel/protobuf/bazel/cc_proto_library.bzl
        - share/bazel/upb/bazel/upb_c_proto_library.bzl

about:
  homepage: https://developers.google.com/protocol-buffers/
  repository: https://github.com/protocolbuffers/protobuf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Bazel rules for protobuf

extra:
  recipe-maintainers:
    - conda-forge/libprotobuf
